spring.application.name=InterviewMate

# Carga opcional de secretos locales (no versionado)
spring.config.import=optional:classpath:application-local.properties

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/interviewmate}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=${PORT:8081}

# Database pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}

# JWT
app.jwt.secret=${JWT_SECRET:your-super-secret-key-minimum-32-characters-long}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
spring.security.oauth2.client.registration.google.scope=${GOOGLE_SCOPE:openid,profile,email}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}

# Frontend redirect
app.oauth2.authorized-redirect-uri=${APP_OAUTH2_AUTHORIZED_REDIRECT_URI:http://localhost:5173/dashboard}
app.oauth2.error-redirect-uri=${APP_OAUTH2_ERROR_REDIRECT_URI:http://localhost:5173/login}
app.oauth2.cookie-name=${APP_OAUTH2_COOKIE_NAME:interviewmate_auth}
app.oauth2.cookie-same-site=${APP_OAUTH2_COOKIE_SAME_SITE:Lax}
app.oauth2.cookie-secure=${APP_OAUTH2_COOKIE_SECURE:false}
app.oauth2.cookie-http-only=${APP_OAUTH2_COOKIE_HTTP_ONLY:false}
app.oauth2.cookie-path=${APP_OAUTH2_COOKIE_PATH:/}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}

# ==========================================
# CONFIGURACIÓN DE IA (GOOGLE GEMINI)
# ==========================================

# Spring AI - Google Gemini API
spring.ai.google.generativeai.api-key=${AI_INTERVIEW_API_KEY:}

# Claves usadas por la capa de servicio actual (RestTemplate)
app.ai.interview.api-key=${AI_INTERVIEW_API_KEY:}
app.ai.study.api-key=${AI_STUDY_API_KEY:${AI_INTERVIEW_API_KEY:}}

# Configuración del modelo para simulación de entrevistas
app.ai.interview.enabled=${AI_INTERVIEW_ENABLED:true}
app.ai.interview.provider=${AI_INTERVIEW_PROVIDER:google-gemini}
app.ai.interview.chat-model=${AI_INTERVIEW_CHAT_MODEL:gemini-1.5-flash}
app.ai.interview.base-url=${AI_INTERVIEW_BASE_URL:https://generativelanguage.googleapis.com/v1beta}

# Parámetros técnicos del modelo
spring.ai.google.generativeai.chat.options.model=gemini-1.5-flash
spring.ai.google.generativeai.chat.options.temperature=0.7
spring.ai.google.generativeai.chat.options.max-output-tokens=1024

# Configuración del modelo para sesiones de estudio
app.ai.study.enabled=${AI_STUDY_ENABLED:true}
app.ai.study.provider=${AI_STUDY_PROVIDER:google-gemini}
app.ai.study.chat-model=${AI_STUDY_CHAT_MODEL:gemini-1.5-flash}
app.ai.study.text-model=${AI_STUDY_TEXT_MODEL:gemini-1.5-flash}
app.ai.study.base-url=${AI_STUDY_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
