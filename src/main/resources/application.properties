spring.application.name=InterviewMate

# ?? Server ????????????????????????????????????????????????????????????????????
server.port=8080

# ?? Database ??????????????????????????????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/interviewmate
spring.datasource.username=postgres
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=validate

# ?? JWT ???????????????????????????????????????????????????????????????????????
# IMPORTANT: Change this to a random secret of at least 32 characters in production
# Use an environment variable: APP_JWT_SECRET
app.jwt.secret=your-super-secret-key-minimum-32-characters-long
app.jwt.expiration-ms=3600000

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.com.interviewmate=DEBUG
logging.level.org.springframework.security=WARN
