spring.application.name=InterviewMate

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=${PORT}

# Database pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE}

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=${GOOGLE_SCOPE}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI}

# Frontend redirect
app.oauth2.authorized-redirect-uri=${APP_OAUTH2_AUTHORIZED_REDIRECT_URI}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS}

# AI Interview
app.ai.interview.enabled=${AI_INTERVIEW_ENABLED}
app.ai.interview.provider=${AI_INTERVIEW_PROVIDER}
app.ai.interview.api-key=${AI_INTERVIEW_API_KEY}
app.ai.interview.base-url=${AI_INTERVIEW_BASE_URL}
app.ai.interview.chat-model=${AI_INTERVIEW_CHAT_MODEL}
app.ai.interview.tts-model=${AI_INTERVIEW_TTS_MODEL}
app.ai.interview.voice=${AI_INTERVIEW_VOICE}

# AI Study
app.ai.study.enabled=${AI_STUDY_ENABLED}
app.ai.study.provider=${AI_STUDY_PROVIDER}
app.ai.study.api-key=${AI_STUDY_API_KEY}
app.ai.study.base-url=${AI_STUDY_BASE_URL}
app.ai.study.transcription-model=${AI_STUDY_TRANSCRIPTION_MODEL}
app.ai.study.text-model=${AI_STUDY_TEXT_MODEL}