spring.application.name=InterviewMate

# H2 and JPA (dev)
spring.datasource.url=jdbc:h2:mem:interviewmate;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT defaults (override in prod)
app.jwt.secret=verysecretkeyverysecretkeyverysecret
app.jwt.expiration-ms=3600000
