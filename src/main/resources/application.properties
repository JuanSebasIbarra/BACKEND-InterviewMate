spring.application.name=InterviewMate

# PostgreSQL (production / development) - main DB
spring.datasource.url=jdbc:postgresql://localhost:5432/interviewmate
spring.datasource.username=postgres
spring.datasource.password=anacar57
spring.datasource.driver-class-name=org.postgresql.Driver

# CORRECT HIBERNATE DIALECT FOR POSTGRESQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT defaults (override in prod)
app.jwt.secret=verysecretkeyverysecretkeyverysecret
app.jwt.expiration-ms=3600000
