spring.application.name=InterviewMate

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/interviewmate}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=${PORT:8081}

# Database pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}

# JWT
app.jwt.secret=${JWT_SECRET:your-super-secret-key-minimum-32-characters-long}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
spring.security.oauth2.client.registration.google.scope=${GOOGLE_SCOPE:openid,profile,email}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

# Frontend redirect
app.oauth2.authorized-redirect-uri=${APP_OAUTH2_AUTHORIZED_REDIRECT_URI:http://localhost:5173/dashboard}
app.oauth2.error-redirect-uri=${APP_OAUTH2_ERROR_REDIRECT_URI:http://localhost:5173/login}
app.oauth2.cookie-name=${APP_OAUTH2_COOKIE_NAME:interviewmate_auth}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}

# AI Interview
app.ai.interview.enabled=${AI_INTERVIEW_ENABLED:false}
app.ai.interview.provider=${AI_INTERVIEW_PROVIDER:openai}
app.ai.interview.api-key=${AI_INTERVIEW_API_KEY:}
app.ai.interview.base-url=${AI_INTERVIEW_BASE_URL:https://api.openai.com/v1}
app.ai.interview.chat-model=${AI_INTERVIEW_CHAT_MODEL:gpt-4o-mini}
app.ai.interview.tts-model=${AI_INTERVIEW_TTS_MODEL:gpt-4o-mini-tts}
app.ai.interview.voice=${AI_INTERVIEW_VOICE:alloy}

# AI Study
app.ai.study.enabled=${AI_STUDY_ENABLED:false}
app.ai.study.provider=${AI_STUDY_PROVIDER:openai}
app.ai.study.api-key=${AI_STUDY_API_KEY:}
app.ai.study.base-url=${AI_STUDY_BASE_URL:https://api.openai.com/v1}
app.ai.study.transcription-model=${AI_STUDY_TRANSCRIPTION_MODEL:whisper-1}
app.ai.study.text-model=${AI_STUDY_TEXT_MODEL:gpt-4o-mini}
